  <text x="673" y="136" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" font-weight="500" fill="#86868B">Cyber</text>

  <rect x="707" y="122" width="60" height="22" rx="11" fill="#000000" fill-opacity="0.03"/>
  <text x="737" y="136" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" font-weight="500" fill="#86868B">Training</text>

  <rect x="775" y="122" width="60" height="22" rx="11" fill="#000000" fill-opacity="0.03"/>
  <text x="805" y="136" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" font-weight="500" fill="#86868B">Phishing</text>

  <rect x="843" y="122" width="76" height="22" rx="11" fill="#000000" fill-opacity="0.03"/>
  <text x="881" y="136" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" font-weight="500" fill="#86868B">Compliance</text>

  <text x="1121" y="158" text-anchor="end" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="500" fill="#334155">kindssecurity.com →</text>
